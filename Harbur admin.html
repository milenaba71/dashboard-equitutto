<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equistasi® – Admin Quiz HARBUR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap');
:root{
  --navy:#0B2545;--blue:#1B4F9B;--yellow:#F5C800;
  --ok:#1A7A4A;--errore:#C0392B;
  --bg:#F2F6FA;--white:#fff;--brd:#D2E0EC;--soft:#4A6278;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Open Sans',sans-serif;background:var(--bg);min-height:100vh;}

header{background:var(--navy);height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;box-shadow:0 3px 16px rgba(11,37,69,.35);}
.logo img{height:40px;}
.hbadge{color:var(--yellow);font-family:'Raleway',sans-serif;font-weight:700;font-size:14px;letter-spacing:.5px;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 70px);}
.login-box{background:var(--white);border-radius:14px;padding:44px 48px;max-width:380px;width:100%;box-shadow:0 8px 40px rgba(11,37,69,.13);border-top:4px solid var(--yellow);text-align:center;}
.login-box h2{font-family:'Raleway',sans-serif;font-weight:800;font-size:22px;color:var(--navy);margin-bottom:8px;}
.login-box p{font-size:13px;color:var(--soft);margin-bottom:28px;}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid var(--brd);border-radius:8px;font-size:15px;margin-bottom:12px;outline:none;font-family:'Open Sans',sans-serif;}
.login-box input:focus{border-color:var(--blue);}
.login-err{color:var(--errore);font-size:13px;margin-bottom:10px;display:none;}
.login-err.on{display:block;}

/* MAIN ADMIN */
#admin-screen{display:none;padding:32px 24px 60px;}
.admin-wrap{max-width:900px;margin:0 auto;}
.admin-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.admin-top h1{font-family:'Raleway',sans-serif;font-weight:800;font-size:24px;color:var(--navy);}
.admin-top .btns{display:flex;gap:10px;}

.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border:none;border-radius:8px;font-family:'Raleway',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;box-shadow:0 4px 14px rgba(27,79,155,.25);}
.btn-primary:hover{transform:translateY(-1px);}
.btn-yellow{background:var(--yellow);color:var(--navy);}
.btn-yellow:hover{opacity:.9;}
.btn-danger{background:var(--errore);color:#fff;}
.btn-sm{padding:7px 14px;font-size:12px;}

/* CONTATORE */
.counter-bar{background:var(--white);border-radius:10px;padding:16px 22px;margin-bottom:24px;display:flex;align-items:center;gap:20px;box-shadow:0 2px 12px rgba(11,37,69,.08);border-left:4px solid var(--yellow);}
.counter-bar .num{font-family:'Raleway',sans-serif;font-weight:800;font-size:32px;color:var(--navy);}
.counter-bar .lbl{font-size:13px;color:var(--soft);}
.counter-bar .status{margin-left:auto;font-size:13px;font-weight:600;}
.status.ok{color:var(--ok);}
.status.warn{color:var(--errore);}

/* FORM NUOVA DOMANDA */
.add-card{background:var(--white);border-radius:12px;padding:28px 32px;margin-bottom:24px;box-shadow:0 4px 20px rgba(11,37,69,.09);border-top:3px solid var(--blue);}
.add-card h3{font-family:'Raleway',sans-serif;font-weight:700;font-size:16px;color:var(--navy);margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:1.5px solid var(--brd);border-radius:7px;font-family:'Open Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus{border-color:var(--blue);}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.answer-item{position:relative;}
.answer-item label{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;}
.answer-badge{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;}
.badge-A{background:#e74c3c;}
.badge-B{background:#3498db;}
.badge-C{background:#2ecc71;}
.badge-D{background:#f39c12;}

/* LISTA DOMANDE */
.questions-list{display:flex;flex-direction:column;gap:12px;}
.q-card{background:var(--white);border-radius:10px;padding:20px 24px;box-shadow:0 2px 12px rgba(11,37,69,.07);display:flex;gap:16px;align-items:flex-start;border-left:4px solid var(--brd);transition:border-color .2s;}
.q-card:hover{border-left-color:var(--blue);}
.q-num{width:36px;height:36px;border-radius:8px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Raleway',sans-serif;font-weight:800;font-size:15px;flex-shrink:0;}
.q-body{flex:1;}
.q-text{font-weight:600;font-size:15px;color:var(--navy);margin-bottom:10px;line-height:1.4;}
.q-answers{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.q-ans{padding:7px 12px;border-radius:6px;font-size:13px;border:1.5px solid var(--brd);display:flex;align-items:center;gap:8px;}
.q-ans.correct{border-color:var(--ok);background:#e8f5ef;font-weight:700;}
.q-actions{display:flex;gap:6px;margin-left:auto;flex-shrink:0;}
.empty-state{text-align:center;padding:48px;color:var(--soft);font-size:15px;}
.empty-state svg{margin-bottom:12px;opacity:.4;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;border-left:4px solid var(--yellow);}
.toast.show{transform:translateY(0);opacity:1;}
</style>
</head>

<script>
const PASS = "harbur2026";
let questions = [];

// ── LOGIN ──────────────────────────────────────
function doLogin(){
  const pwd = document.getElementById("pwd-input").value;
  if(pwd === PASS){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("admin-screen").style.display="block";
    loadQuestions();
  } else {
    document.getElementById("login-err").classList.add("on");
  }
}
document.getElementById("pwd-input").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });

// ── STORAGE ───────────────────────────────────
function loadQuestions(){
  const saved = localStorage.getItem("harbur_quiz_questions");
  questions = saved ? JSON.parse(saved) : getDefaultQuestions();
  renderList();
}
function saveQuestions(){
  localStorage.setItem("harbur_quiz_questions", JSON.stringify(questions));
  renderList();
}

  ];
}

// ── RENDER LISTA ──────────────────────────────
function renderList(){
  const list = document.getElementById("q-list");
  const count = questions.length;
  document.getElementById("q-count").textContent = count;
  const status = document.getElementById("q-status");
  if(count >= 15){ status.textContent="✅ Quiz completo!"; status.className="status ok"; }
  else { status.textContent=`⚠️ Mancano ${15-count} domande`; status.className="status warn"; }

  if(count === 0){
    list.innerHTML=`<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><br>Nessuna domanda ancora. Aggiungine una qui sotto!</div>`;
    return;
  }
  const colors={A:"#e74c3c",B:"#3498db",C:"#2ecc71",D:"#f39c12"};
  list.innerHTML = questions.map((q,i)=>`
    <div class="q-card" id="qc-${i}">
      <div class="q-num">${i+1}</div>
      <div class="q-body">
        <div class="q-text">${q.d}</div>
        <div class="q-answers">
          ${["A","B","C","D"].map(l=>`
            <div class="q-ans ${q.c_ok===l?'correct':''}">
              <span style="background:${colors[l]};color:#fff;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:800;">${l}</span>
              ${l==="A"?q.a:l==="B"?q.b:l==="C"?q.c:q.e}
              ${q.c_ok===l?' ✓':''}
            </div>`).join("")}
        </div>
      </div>
      <div class="q-actions">
        <button class="btn btn-danger btn-sm" onclick="deleteQ(${i})">🗑</button>
      </div>
    </div>`).join("");
}

// ── AGGIUNGI ──────────────────────────────────
function addQuestion(){
  const d  = document.getElementById("new-domanda").value.trim();
  const a  = document.getElementById("new-a").value.trim();
  const b  = document.getElementById("new-b").value.trim();
  const c  = document.getElementById("new-c").value.trim();
  const e  = document.getElementById("new-d").value.trim();
  const ck = document.getElementById("new-corretta").value;
  if(!d||!a||!b||!c||!e||!ck){ showToast("⚠️ Compila tutti i campi!"); return; }
  questions.push({d,a,b,c,e,c_ok:ck});
  saveQuestions();
  // Reset form
  ["new-domanda","new-a","new-b","new-c","new-d"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("new-corretta").value="";
  showToast("✅ Domanda salvata! ("+questions.length+"/15)");
  window.scrollTo({top:0,behavior:"smooth"});
}

// ── ELIMINA ───────────────────────────────────
function deleteQ(idx){
  if(!confirm("Eliminare questa domanda?")) return;
  questions.splice(idx,1);
  saveQuestions();
  showToast("🗑 Domanda eliminata");
}

// ── EXPORT ────────────────────────────────────
function exportJSON(){
  const blob = new Blob([JSON.stringify(questions,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="harbur-quiz-domande.json";
  a.click();
  showToast("📥 JSON esportato!");
}

function scrollToAdd(){ document.getElementById("add-form").scrollIntoView({behavior:"smooth"}); }

// ── TOAST ─────────────────────────────────────
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}
</script>
